version: "3.8"

# ============================================================
#  DevSecOps Stack Local — SonarQube + Jenkins + Trivy
#  Funciona en Windows (Docker Desktop) y Linux Mint
# ============================================================
#
#  ANTES DE LEVANTAR EN LINUX:
#    sudo sysctl -w vm.max_map_count=524288
#    sudo sysctl -w fs.file-max=131072
#    (agregar a /etc/sysctl.conf para que persista)
#
#  En Windows con Docker Desktop: no se necesita nada extra.
#
#  Levantar: docker compose up -d
#  Bajar: docker compose down
#  Ver logs: docker compose logs -f sonarqube
# ============================================================
name: devsecops-stack    # ← agrega esta línea al inicio

networks:
  devsecops:
    driver: bridge
    name: devsecops      # ← agrega este nombre fijo

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_home:

services:

  # ----------------------------------------------------------
  #  PostgreSQL — Base de datos para SonarQube
  #  No expuesto al host, solo accesible dentro de la red
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: devsecops-postgres    # underscore → guión
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_password   # cambia esto si quieres
      POSTGRES_DB: sonarqube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devsecops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  #  SonarQube Community Edition
  #  UI: http://localhost:9000
  #  Default login: admin / admin (te pedirá cambiarlo)
  # ----------------------------------------------------------
  sonarqube:
    image: sonarqube:community
    container_name: devsecops-sonarqube   # underscore → guión
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_password
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"   # solo para desarrollo local
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    networks:
      - devsecops
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s   # SonarQube tarda en arrancar (~2 min)

  # ----------------------------------------------------------
  #  Jenkins LTS
  #  UI: http://localhost:8080
  #  La clave inicial está en: docker logs devsecops_jenkins
  #  O en el volumen: jenkins_home/secrets/initialAdminPassword
  # ----------------------------------------------------------
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: devsecops-jenkins     # underscore → guión
    restart: unless-stopped
    user: root   # necesario para poder usar Docker dentro de Jenkins
    entrypoint: >
      bash -c "apt-get update -qq &&
               apt-get install -y docker.io -qq &&
               /usr/bin/tini -- /usr/local/bin/jenkins.sh"
    environment:
      JENKINS_OPTS: "--httpPort=8080"
      JAVA_OPTS: "-Xmx512m -Xms256m"   # limita RAM de Jenkins a ~512 MB
    volumes:
      - jenkins_home:/var/jenkins_home
      # Monta el socket de Docker para que Jenkins pueda correr
      # comandos docker (necesario para Trivy dentro de pipelines)
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      - "50000:50000"   # puerto para Jenkins agents (opcional)
    networks:
      - devsecops
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  #  Trivy — Scanner de vulnerabilidades
  #  NO es un servidor permanente, es un runner on-demand.
  #
  #  Uso directo (sin Jenkins):
  #    docker compose run --rm trivy image node:20-alpine
  #    docker compose run --rm trivy fs /scan
  #
  #  Dentro de un Jenkinsfile, se llama como comando shell.
  #  El caché persiste entre escaneos para ser más rápido.
  # ----------------------------------------------------------
  trivy:
    image: aquasec/trivy:latest
    container_name: devsecops-trivy
    volumes:
      # Caché de la base de datos de vulnerabilidades
      - ~/.cache/trivy:/root/.cache/trivy   # Linux
      # En Windows usar: ${USERPROFILE}/.cache/trivy:/root/.cache/trivy
      # Monta tu proyecto para escanear el filesystem
      - .:/scan:ro
    networks:
      - devsecops
    # Trivy no corre como daemon, se invoca on-demand
    entrypoint: ["trivy"]
    command: ["--help"]   # evita que el container salga en error al levantar
    profiles:
      - tools   # no se levanta con "docker compose up", solo con --profile tools
