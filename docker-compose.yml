services:
  postgres:
    image: postgres:16-alpine
    container_name: banking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: banking-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env                      # toma todas las vars del .env
    environment:
      DB_HOST: postgres           # ← sobrescribe localhost por el nombre del servicio
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
